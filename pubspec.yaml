name: accurate_step_counter
description: >-
  Production-grade step counter for Flutter Android. Uses native TYPE_STEP_COUNTER
  sensor via foreground service for accurate tracking in foreground, background,
  and terminated states. Includes SQLite logging, smart merge utilities, and
  warmup validation.
version: 2.0.0
homepage: https://github.com/rahulshahDEV/accurate_step_counter
repository: https://github.com/rahulshahDEV/accurate_step_counter
issue_tracker: https://github.com/rahulshahDEV/accurate_step_counter/issues

environment:
  sdk: ^3.9.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.0
  sensors_plus: ">=6.1.1 <8.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3+1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    platforms:
      android:
        package: com.example.accurate_step_counter
        pluginClass: AccurateStepCounterPlugin
